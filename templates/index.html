<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00f2ff; --bg: #0a0a0c; --border: rgba(255, 255, 255, 0.08); }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; min-height: 100vh; background-image: radial-gradient(circle at 50% 0%, #1a1a2e 0%, #0a0a0c 100%); }
        .container { max-width: 1000px; margin: 0 auto; padding: 100px 20px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 50px; }
        .btn-user { background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 40px; border-radius: 20px; text-decoration: none; color: #fff; text-align: center; font-weight: 800; transition: 0.3s; text-transform: uppercase; }
        .btn-user:hover { border-color: var(--accent); background: rgba(0, 242, 255, 0.1); transform: translateY(-5px); }

        .layout { display: flex; gap: 50px; align-items: flex-start; }
        .side { flex: 0 0 350px; position: sticky; top: 50px; }
        .main { flex: 1; }
        .pic { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 24px; border: 1px solid var(--border); }
        
        .btn-back { display: block; text-align: center; padding: 15px; margin-top: 25px; background: rgba(255,255,255,0.05); color: #fff; text-decoration: none; border-radius: 12px; font-weight: 700; transition: 0.3s; }
        .btn-back:hover { background: var(--accent); color: #000; }

        .wall { margin-top: 40px; background: rgba(255,255,255,0.02); padding: 30px; border-radius: 20px; border: 1px solid var(--border); }
        .inp { width: 100%; background: #111; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 10px; margin-bottom: 10px; box-sizing: border-box; font-family: inherit; }
        .btn-send { width: 100%; padding: 14px; background: var(--accent); border: none; border-radius: 10px; font-weight: 800; cursor: pointer; }

        .note { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 15px; margin-top: 15px; border-left: 4px solid var(--accent); }
        .note-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; }
        .like-btn { background: none; border: 1px solid var(--border); color: #fff; padding: 6px 14px; border-radius: 20px; cursor: pointer; transition: 0.3s; }
        .like-btn:hover { border-color: #ff3366; color: #ff3366; }

        .del-form { display: flex; gap: 5px; }
        .del-inp { width: 60px; background: #000; border: 1px solid #333; color: #fff; font-size: 0.7rem; padding: 5px; border-radius: 5px; }
        .del-btn { background: none; border: 1px solid #333; color: #666; cursor: pointer; font-size: 0.7rem; padding: 5px; }

        @media (max-width: 850px) { .layout { flex-direction: column; } .side { flex: none; width: 100%; position: static; } }
    </style>
</head>
<body>

<div class="container">
    {% if is_home %}
        <h1 style="text-align: center; font-family: 'Syncopate'; font-size: 3rem;">DRAGON</h1>
        <div class="grid">
            {% for name, link in buttons %}
                <a href="{{ url_for('show_page', page_name=link) }}" class="btn-user">{{ name }}</a>
            {% endfor %}
        </div>
    {% else %}
        <div class="layout">
            <div class="side">
                <img src="{{ url_for('static', filename='images/' + photo) }}" class="pic">
                <a href="/" class="btn-back">← НА ГЛАВНУЮ</a>
            </div>
            <div class="main">
                <h1 style="margin: 0; font-family: 'Syncopate';">{{ title }}</h1>
                <p style="color: #aaa; font-size: 1.2rem;">{{ description }}</p>

                <div class="wall">
                    <form action="{{ url_for('add_note', recipient=page_id) }}" method="POST">
                        <input type="text" name="author" class="inp" placeholder="Твой ник">
                        <textarea name="content" class="inp" placeholder="Написать на стене..." rows="3" required></textarea>
                        <button type="submit" class="btn-send">ОПУБЛИКОВАТЬ</button>
                    </form>

                    <div style="margin-top: 30px;">
                        {% for note in notes %}
                            <div class="note">
                                <div style="font-size: 0.8rem; color: var(--accent); font-weight: 800; margin-bottom: 8px;">
                                    {{ note.author }} • {{ note.date_posted.strftime('%H:%M') }}
                                </div>
                                <div style="line-height: 1.5;">{{ note.content }}</div>
                                <div class="note-footer">
                                    <form action="{{ url_for('like_note', note_id=note.id) }}" method="POST">
                                        <button type="submit" class="like-btn">❤️ {{ note.likes or 0 }}</button>
                                    </form>

                                    <form action="{{ url_for('delete_note', note_id=note.id) }}" method="POST" class="del-form">
                                        <input type="password" name="password" class="del-inp" placeholder="Pass">
                                        <button type="submit" class="del-btn">Удалить</button>
                                    </form>
                                </div>
                            </div>
                        {% endfor %}
                    </div>
                </div>
            </div>
        </div>
    {% endif %}
</div>

</body>
</html>
