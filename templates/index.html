<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00f2ff; --bg: #0a0a0c; --border: rgba(255, 255, 255, 0.08); }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; min-height: 100vh; background-image: radial-gradient(circle at 50% 0%, #1a1a2e 0%, #0a0a0c 100%); }
        .container { max-width: 1000px; margin: 0 auto; padding: 120px 20px 50px; }
        
        /* Сетка */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 50px; }
        .btn-user { background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 40px; border-radius: 20px; text-decoration: none; color: #fff; text-align: center; font-weight: 800; transition: 0.3s; text-transform: uppercase; }
        .btn-user:hover { border-color: var(--accent); background: rgba(0, 242, 255, 0.1); transform: translateY(-5px); }

        /* Профиль */
        .layout { display: flex; gap: 50px; align-items: flex-start; }
        .side { flex: 0 0 350px; position: sticky; top: 120px; }
        .main { flex: 1; }
        .pic { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 24px; border: 1px solid var(--border); }
        
        .btn-back { display: block; text-align: center; padding: 15px; margin-top: 25px; background: rgba(255,255,255,0.05); color: #fff; text-decoration: none; border-radius: 12px; font-weight: 700; transition: 0.3s; }
        .btn-back:hover { background: var(--accent); color: #000; }

        .wall { margin-top: 40px; background: rgba(255,255,255,0.02); padding: 30px; border-radius: 20px; border: 1px solid var(--border); }
        .inp { width: 100%; background: #111; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 10px; margin-bottom: 10px; box-sizing: border-box; font-family: inherit; }
        .btn-send { width: 100%; padding: 14px; background: var(--accent); border: none; border-radius: 10px; font-weight: 800; cursor: pointer; text-transform: uppercase; }

        /* Заметки */
        .note { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 15px; margin-top: 15px; border-left: 4px solid var(--accent); }
        .note.admin { border-color: #ffcc00; background: rgba(255, 204, 0, 0.05); }
        .note-head { font-size: 0.75rem; color: var(--accent); font-weight: 800; margin-bottom: 8px; text-transform: uppercase; }
        .note.admin .note-head { color: #ffcc00; }
        
        .note-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; }
        .like-btn { background: none; border: 1px solid var(--border); color: #fff; padding: 6px 14px; border-radius: 20px; cursor: pointer; transition: 0.3s; }
        .like-btn:hover { border-color: #ff3366; color: #ff3366; }

        .delete-form { display: flex; gap: 5px; }
        .del-inp { width: 60px; background: #000; border: 1px solid #333; color: #fff; font-size: 0.7
