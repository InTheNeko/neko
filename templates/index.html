<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <style>
        :root { 
            --neon: #00ffcc; 
            --bg: #0a0a0c; 
            --card-bg: #121214; 
            --text-gray: #a0a0a5;
        }

        body {
            margin: 0; font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg); color: #fff;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            background-image: radial-gradient(circle at center, #1a1a1d 0%, #0a0a0c 100%);
        }

        .card {
            background: var(--card-bg); padding: 40px; border-radius: 24px;
            width: 100%; max-width: 360px; text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transition: transform 0.3s ease;
        }

        /* Заголовок с эффектом свечения */
        h1 { 
            font-size: 48px; font-weight: 900; letter-spacing: 8px; 
            margin: 0 0 30px 0; color: var(--neon); text-transform: uppercase;
            text-shadow: 0 0 15px rgba(0, 255, 204, 0.3);
        }

        .profile-mode h1 { font-size: 32px; letter-spacing: 2px; }

        .player-photo {
            width: 100%; height: 280px; object-fit: cover;
            border-radius: 16px; margin-bottom: 25px; 
            border: 2px solid rgba(0, 255, 204, 0.1);
        }

        .desc { font-size: 15px; color: var(--text-gray); line-height: 1.6; margin-bottom: 30px; }

        .links-container { display: flex; flex-direction: column; gap: 10px; }
        
        .link-tag, .btn {
            padding: 16px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
            color: #fff; text-decoration: none; border-radius: 12px; font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .link-tag:hover, .btn:hover { 
            background: var(--neon); color: #000; 
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 255, 204, 0.2);
        }

        .menu-vertical { display: flex; flex-direction: column; gap: 12px; }

        .btn-back { 
            display: inline-block; color: #555; margin-top: 25px; 
            font-size: 12px; text-decoration: none; letter-spacing: 2px; 
            transition: 0.3s;
        }
        .btn-back:hover { color: var(--neon); }

        /* Анимация появления */
        .fade-in { animation: fadeIn 0.6s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div class="card fade-in {% if not is_home %}profile-mode{% endif %}">
        <h1>{{ title }}</h1>

        {% if not is_home %}
            {% if photo %}
                <img src="{{ url_for('static', filename='images/' + photo) }}" class="player-photo" alt="{{ title }}">
            {% endif %}
            
            <p class="desc">{{ description }}</p>
            
            <div class="links-container">
                {% for label, url in links %}
                    <a href="{{ url }}" class="link-tag" target="_blank">{{ label }}</a>
                {% endfor %}
            </div>
            
            <a href="/" class="btn-back">← BACK TO SQUAD</a>
        {% else %}
            <div class="menu-vertical">
                {% for name, link in buttons %}
                    <a href="/{{ link }}" class="btn">{{ name }}</a>
                {% endfor %}
            </div>
        {% endif %}
    </div>

</body>
</html>
