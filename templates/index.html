<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{{ title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00f2ff; --bg: #0a0a0c; --border: rgba(255, 255, 255, 0.08); }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; min-height: 100vh; }
        .container { max-width: 1000px; margin: 0 auto; padding: 60px 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 50px; }
        .btn-user { background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 40px; border-radius: 20px; text-decoration: none; color: #fff; text-align: center; font-weight: 800; transition: 0.3s; text-transform: uppercase; display: block; }
        .btn-user:hover { border-color: var(--accent); background: rgba(0, 242, 255, 0.1); transform: translateY(-5px); }
        .layout { display: flex; gap: 50px; }
        .side { flex: 0 0 320px; }
        .pic { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 24px; border: 1px solid var(--border); background: #111; }
        .inp { width: 100%; background: #111; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 10px; margin-bottom: 10px; box-sizing: border-box; font-family: inherit; }
        .btn-send { width: 100%; padding: 14px; background: var(--accent); border: none; border-radius: 10px; font-weight: 800; cursor: pointer; color: #000; }
        
        /* Кнопки соцсетей */
        .social-box { display: flex; gap: 10px; margin-top: 20px; }
        .soc-btn { flex: 1; padding: 10px; border-radius: 10px; text-decoration: none; text-align: center; font-weight: 700; font-size: 0.8rem; color: #fff; border: 1px solid var(--border); transition: 0.3s; }
        .tg { background: #229ED933; border-color: #229ED9; }
        .vk { background: #0077FF33; border-color: #0077FF; }
        .soc-btn:hover { transform: scale(1.05); }
    </style>
</head>
<body>
<div class="container">
    {% if is_home %}
        <h1 style="text-align: center; font-family: 'Syncopate'; font-size: 3rem; letter-spacing: 10px;">DRAGON</h1>
        <div class="grid">
            {% for display_name, username in buttons %}
                <a href="{{ url_for('show_page', page_name=username) }}" class="btn-user">{{ display_name }}</a>
            {% endfor %}
        </div>
    {% else %}
        <div class="layout">
            <div class="side">
                <img src="{{ url_for('static', filename='images/' + current_photo) }}" class="pic" onerror="this.src='https://via.placeholder.com/300?text=No+Photo'">
                
                <div class="social-box">
                    {% if user.tg_link %}
                        <a href="{{ user.tg_link }}" target="_blank" class="soc-btn tg">TELEGRAM</a>
                    {% endif %}
                    {% if user.vk_link %}
                        <a href="{{ user.vk_link }}" target="_blank" class="soc-btn vk">VKONTAKTE</a>
                    {% endif %}
                </div>

                <div style="margin-top: 30px; border-top: 1px solid #222; padding-top: 15px;">
                    <details>
                        <summary style="font-size: 0.7rem; cursor:pointer; color: #444;">⚙️ НАСТРОЙКИ</summary>
                        <form action="{{ url_for('edit_profile', page_name=page_id) }}" method="POST" enctype="multipart/form-data" style="margin-top:10px;">
                            <input type="password" name="admin_password" class="inp" placeholder="Пароль">
                            <textarea name="description" class="inp" style="font-size:0.7rem; height: 60px;">{{ user.bio }}</textarea>
                            <input type="text" name="tg_link" class="inp" placeholder="Ссылка на TG" value="{{ user.tg_link }}">
                            <input type="text" name="vk_link" class="inp" placeholder="Ссылка на VK" value="{{ user.vk_link }}">
                            <input type="file" name="photo" style="font-size:0.6rem; margin-bottom:10px;">
                            <button type="submit" class="btn-send" style="padding:5px; font-size:0.7rem;">СОХРАНИТЬ</button>
                        </form>
                    </details>
                </div>
                <a href="/" style="display: block; text-align: center; margin-top: 20px; color: #666; text-decoration: none;">← НАЗАД</a>
            </div>
            <div class="main" style="flex:1;">
                <h1 style="margin: 0; font-family: 'Syncopate'; color: var(--accent); text-transform: uppercase;">{{ user.display_name }}</h1>
                <p style="color: #aaa; line-height: 1.6; font-size: 1.1rem; white-space: pre-wrap;">{{ user.bio }}</p>
            </div>
        </div>
    {% endif %}
</div>
</body>
</html>
